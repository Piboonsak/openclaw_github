# WebSocket upgrade header map
# Include this file in the nginx http {} context:
#   sudo cp ws-upgrade-map.conf /etc/nginx/conf.d/ws-upgrade-map.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Maps the incoming Upgrade header to the correct Connection header value:
#   - WebSocket upgrade request → Connection: upgrade
#   - Regular HTTP request      → Connection: close
#
# Referenced as $connection_upgrade in openclaw.conf location blocks.

map $http_upgrade $connection_upgrade {
    default  upgrade;
    ""       close;
}
