# OpenClaw Gateway — Nginx Reverse Proxy Configuration
# Production deployment for openclaw.yahwan.biz
#
# Hostinger VPS: srv1414058.hstgr.cloud (76.13.210.250)
# Backend:       127.0.0.1:18789 (Docker container, localhost-only)
# TLS:           Let's Encrypt (Certbot)
#
# Prerequisites:
#   1. Install the WebSocket upgrade map (http-context directive):
#      sudo cp ws-upgrade-map.conf /etc/nginx/conf.d/ws-upgrade-map.conf
#   2. Install this site config:
#      sudo cp openclaw.conf /etc/nginx/sites-available/openclaw
#      sudo ln -s /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/openclaw
#      sudo rm -f /etc/nginx/sites-enabled/default
#      sudo nginx -t && sudo systemctl reload nginx

# ── HTTPS server block ────────────────────────────────────────────────────────
server {
    server_name openclaw.yahwan.biz;

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # SSL certificate paths (populated by Certbot)
    ssl_certificate     /etc/letsencrypt/live/openclaw.yahwan.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.yahwan.biz/privkey.pem;

    # Certbot-managed SSL options (strong ciphers, OCSP stapling, etc.)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header X-Frame-Options            "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection           "1; mode=block"                                always;

    # ── Web UI (Control UI / WebChat) — /chat ─────────────────────────────────
    # Serves the browser-based chat UI and its WebSocket connection.
    # The gateway serves the control-ui assets and the webchat WebSocket on
    # the same port 18789; this block makes the path explicit so nginx correctly
    # handles both the initial HTTP page load and the subsequent WS upgrade.
    location /chat {
        proxy_pass         http://127.0.0.1:18789;
        proxy_buffering    off;

        # Standard forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $server_name;

        # WebSocket support (browser upgrades to WS after loading the UI)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        # $connection_upgrade is set by ws-upgrade-map.conf (conf.d):
        #   WebSocket requests → "upgrade"; plain HTTP requests → "close"
        proxy_set_header   Connection $connection_upgrade;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        proxy_redirect off;
    }

    # ── Main proxy (OpenClaw Gateway + WebSocket) ──────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:18789;
        proxy_buffering    off;

        # Standard forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $server_name;

        # WebSocket support (required for OpenClaw live updates)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        # $connection_upgrade is set by ws-upgrade-map.conf (conf.d):
        #   WebSocket requests → "upgrade"; plain HTTP requests → "close"
        proxy_set_header   Connection $connection_upgrade;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        proxy_redirect off;
    }

    # ── Health check (monitoring, no auth required) ────────────────────────
    location = /health {
        proxy_pass       http://127.0.0.1:18789/health;
        proxy_set_header Host $host;
        access_log       off;
    }
    # ── LINE webhook (native handler via OpenClaw gateway on port 18789) ──────
    # R3 fix: Route LINE webhooks directly to native async handler instead of
    # Flask bridge. Native handler responds HTTP 200 immediately and processes
    # the message asynchronously, preventing LINE platform 499 timeouts.
    # Issue #32/#21: Timeout increased to 300s for complex multi-step agent responses.
    location /line/ {
        proxy_pass       http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── LINE webhook fallback (Flask bridge on port 5100) ──────────────────
    # Kept as fallback route at /line-bridge/ in case native handler fails.
    # Flask bridge: /opt/line-bridge/app.py (systemd line-bridge.service)
    location /line-bridge/ {
        proxy_pass       http://127.0.0.1:5100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ── HTTP redirect block (80 → 443) ───────────────────────────────────────────
server {
    server_name openclaw.yahwan.biz;

    listen 80;
    listen [::]:80;

    # Allow Let's Encrypt ACME challenge renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ── Catch-all: drop unknown virtual hosts ────────────────────────────────────
server {
    listen 80  default_server;
    listen [::]:80  default_server;
    listen 443 ssl  default_server;
    listen [::]:443 ssl default_server;

    # Reuse the same cert to satisfy SSL handshake before closing
    ssl_certificate     /etc/letsencrypt/live/openclaw.yahwan.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openclaw.yahwan.biz/privkey.pem;

    server_name _;
    return 444;  # Close connection without response
}
