# Production Docker Compose for OpenClaw
# Hostinger VPS deployment with security hardening
#
# Usage:
#   1. Copy .env.example to .env and fill in your secrets
#   2. docker-compose -f docker/docker-compose.prod.yml up -d
#
# NEVER commit .env file to git!

services:
  openclaw-gateway:
    # Use your Docker Hub image (update after pushing)
    image: ${DOCKER_IMAGE:-piboonsak/openclaw:latest}
    container_name: openclaw-sgnl-openclaw-1

    # Security: Run as non-root user
    user: "1000:1000"
    working_dir: /app

    # Security: Read-only root filesystem (except mounted volumes)
    read_only: true

    # Security: Disable privilege escalation
    security_opt:
      - no-new-privileges:true

    # Security: Drop all capabilities
    cap_drop:
      - ALL

    # Ports: Bind to localhost only (127.0.0.1) for security
    # External access via Nginx reverse proxy on ports 80/443 with SSL
    # Backend app port 18789 MUST NOT be exposed to external network
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"

    # Load environment variables from .env file (Issue #67: Dev workspace support)
    # Place .env next to docker-compose.prod.yml; copy from .env.example
    env_file:
      - .env

    # Environment variables (DO NOT commit secrets here - use .env file)
    environment:
      # Gateway authentication (REQUIRED)
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # AI Model providers (at least one required)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

      # System environment
      NODE_ENV: production
      TERM: xterm-256color

      # Timezone (override in .env; default UTC if unset)
      TZ: ${TZ:-Asia/Bangkok}

      # Security: Disable shell env loading
      OPENCLAW_LOAD_SHELL_ENV: "0"

      # Optional: Tool API keys
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      BRAVE_API_ANSWER_KEY: ${BRAVE_API_ANSWER_KEY:-}
      BRAVE_API_SEARCH_KEY: ${BRAVE_API_SEARCH_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}

      # Channel API credentials (LINE, Discord, Telegram, etc.)
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}

      # Docker Hub (for image pulls)
      DOCKER_USERNAME: ${DOCKER_USERNAME:-}
      DOCKER_TOKEN: ${DOCKER_TOKEN:-}

      # GitHub (for code operations, optional)
      GITHUB_USER: ${GITHUB_USER:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GH_TOKEN: ${GITHUB_TOKEN:-}

      # Container home directory
      HOME: /app
      GITREPO_PATH: /app/gitrepo

    # Persistent volumes
    volumes:
      # State directory (config, credentials, logs) — CRITICAL: must mount to /data/.openclaw (HOME path)
      # Previously: /data/openclaw/state (WRONG — config lost on restart)
      - openclaw-state:/data/.openclaw
      # Also mount state at $HOME/.openclaw so app can write to it (read_only: true blocks /app)
      - openclaw-state:/app/.openclaw
      # Mount state at /etc/passwd homedir too — os.homedir() reads /etc/passwd not $HOME
      - openclaw-state:/home/node/.openclaw
      # Workspace directory (agent working directory)
      - openclaw-workspace:/data/openclaw/workspace
      # Make env file available inside container
      # NOTE: .env MUST be inside working directory so it's accessible
      - ./.env:/app/.env:ro
      # Dedicated development repo area for clone/build tasks
      - ./volumes/gitrepo:/app/gitrepo
      # Temporary directory (writable in read-only container)
      # tmpfs: Docker creates /tmp with mode 1777 by default
      # If job tmpfs needs custom size: docker run --tmpfs /tmp:size=100M,mode=1777
      - /tmp

    # Resource limits — match VPS ceiling (4 vCPU, 16 GB RAM)
    # Monitor with: docker stats openclaw-sgnl-openclaw-1
    # If OOM-killed (exit 137): reduce context window config, not these limits
    # Security: Limit process count (inside deploy.resources to avoid compose conflict)
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G
          pids: 200
        reservations:
          cpus: "1.0"
          memory: 1G

    # Alternative syntax for older Docker Compose versions:
    # cpus: 4
    # mem_limit: 16g
    # mem_reservation: 1g

    # Auto-restart on failure
    restart: unless-stopped

    # Health check (matches Dockerfile HEALTHCHECK)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

    # Use init to handle zombie processes
    init: true

    # Network configuration
    networks:
      - openclaw-net

  # One-shot service: backup config + sessions before docker compose down
  # Usage: docker compose -f docker/docker-compose.prod.yml run --rm backup-config
  # Creates timestamped backup at ./backups/openclaw.json.<timestamp>
  backup-config:
    image: ${DOCKER_IMAGE:-piboonsak/openclaw:latest}
    entrypoint: ["bash", "/scripts/backup-config.sh"]
    volumes:
      - openclaw-state:/data/.openclaw:ro
      - ./backups:/backups
      - ./scripts/backup-config.sh:/scripts/backup-config.sh:ro
    profiles:
      - maintenance
    networks:
      - openclaw-net

  # One-shot service: clear stale LINE session history before deploy
  # Usage: docker compose -f docker/docker-compose.prod.yml run --rm clear-sessions
  clear-sessions:
    image: ${DOCKER_IMAGE:-piboonsak/openclaw:latest}
    entrypoint: ["bash", "/scripts/clear-sessions.sh"]
    volumes:
      - openclaw-state:/data/.openclaw
      - ./scripts/clear-sessions.sh:/scripts/clear-sessions.sh:ro
    profiles:
      - maintenance
    networks:
      - openclaw-net

# Named volumes for data persistence
volumes:
  openclaw-state:
    driver: local
  openclaw-workspace:
    driver: local

# Internal bridge network
networks:
  openclaw-net:
    driver: bridge
    internal: false # Set to true to disable all external network access (sandbox mode)
