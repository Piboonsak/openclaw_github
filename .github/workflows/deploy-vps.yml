name: Deploy to Hostinger VPS

# Runs AFTER docker-build-push.yml pushes the image to Docker Hub.
# Triggers:
#   - Completion of the "Build and Push Docker Image" workflow on main
#   - Manual trigger (workflow_dispatch)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DEPLOY_SSH_PRIVATE_KEY  Private key for srv1414058.hstgr.cloud
#                           (contents of C:\Users\..\.ssh\id_ed25519_hostinger)
#   VPS_HOST             srv1414058.hstgr.cloud   (or 76.13.210.250)
#   VPS_USER             root
#   DOCKER_USERNAME      piboonsak  (already set for docker-build-push)
#   DOCKER_TOKEN         Docker Hub PAT (already set for docker-build-push)

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"

concurrency:
  group: deploy-vps-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy piboonsak/openclaw to VPS
    runs-on: ubuntu-latest

    # Only deploy when the build workflow succeeded (skip on failure/cancel)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Create deployment log directory ────────────────────────────────────
      - name: Create deployment log directory
        run: |
          mkdir -p "operations/deployments/deploy-${{ github.run_number }}/logs"
          cat > "operations/deployments/deploy-${{ github.run_number }}/logs/metadata.json" << 'METADATA'
          {
            "run_id": "${{ github.run_id }}",
            "run_number": ${{ github.run_number }},
            "branch": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "workflow_file": "deploy-vps.yml",
            "repository": "${{ github.repository }}"
          }
          METADATA

      # ── Resolve image tag ──────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: piboonsak/openclaw:${TAG}"

      # ── Write SSH key to disk (ephemeral runner) ───────────────────────────
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519_hostinger
          chmod 600 ~/.ssh/id_ed25519_hostinger
          # Pre-approve host key to avoid interactive prompt
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── Copy the production nginx config to VPS and apply if valid ───────────
      - name: Sync and apply Nginx config to VPS
        run: |
          scp -i ~/.ssh/id_ed25519_hostinger \
              -o StrictHostKeyChecking=no \
              docker/nginx/openclaw.conf \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/openclaw-nginx.conf"
          # Test and apply the new config (rollback to existing if nginx -t fails)
          ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s << 'NGINX_EOF'
          set -euo pipefail
          # Backup current config
          cp /etc/nginx/sites-available/openclaw /etc/nginx/sites-available/openclaw.bak.$(date +%Y%m%d%H%M%S) 2>/dev/null || true
          # Apply new config
          cp /tmp/openclaw-nginx.conf /etc/nginx/sites-available/openclaw
          ln -sf /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/openclaw
          # Test and reload
          if nginx -t 2>/dev/null; then
            nginx -s reload
            echo "✓ Nginx config applied and reloaded successfully"
          else
            echo "ERROR: Nginx config test failed — rolling back"
            # Restore backup
            LATEST_BAK=$(ls -t /etc/nginx/sites-available/openclaw.bak.* 2>/dev/null | head -1)
            if [ -n "$LATEST_BAK" ]; then
              cp "$LATEST_BAK" /etc/nginx/sites-available/openclaw
              nginx -s reload
              echo "Rolled back to previous config"
            fi
            exit 1
          fi
          NGINX_EOF

      # NOTE: The VPS docker-compose lives at /docker/openclaw-sgnl/docker-compose.yml
      # deploy.sh now syncs docker/docker-compose.prod.yml from repo to VPS on every deploy
      # (Issue #67), then updates the image tag in-place. This ensures new volume mounts,
      # env_file directives, and environment variables reach the VPS.

      # ── Run deploy.sh on VPS ───────────────────────────────────────────────
      - name: Deploy container
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          # SSH_KEY intentionally omitted: deploy.sh defaults to $HOME/.ssh/id_ed25519_hostinger
          # (tilde is not variable-expanded in GitHub Actions env values)
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          APP_DIR: /docker/openclaw-sgnl
        run: |
          bash docker/deploy.sh "$IMAGE_TAG"

      # ── Sync model config from repo to VPS (selective merge) ─────────────
      # The VPS config at /data/.openclaw/openclaw.json contains runtime state
      # (meta, wizard, plugins, commands) that must be preserved.
      # We selectively merge ONLY the model-related fields from the repo template.
      - name: Sync model config to VPS
        run: |
          # Install json5 in isolated temp dir to avoid ERESOLVE conflicts with project deps
          TMPDIR=$(mktemp -d)
          (cd "$TMPDIR" && npm init -y --silent && npm install --silent json5)

          # Extract model config from repo's JSON5 template
          NODE_PATH="$TMPDIR/node_modules" node -e "
            const json5 = require('json5');
            const fs = require('fs');
            const src = fs.readFileSync('config/openclaw.prod.json5', 'utf8');
            const cfg = json5.parse(src);
            const patch = {
              model: cfg.agents.defaults.model,
              models: cfg.agents.defaults.models
            };
            fs.writeFileSync('/tmp/model-patch.json', JSON.stringify(patch, null, 2));
            console.log('Model patch extracted:', JSON.stringify(patch.model, null, 2));
          "
          rm -rf "$TMPDIR"

          # Upload patch to VPS
          scp -i ~/.ssh/id_ed25519_hostinger \
              -o StrictHostKeyChecking=no \
              /tmp/model-patch.json \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/model-patch.json"

          # Merge patch into running config using jq, then restart container
          ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash -s << 'CONFIG_EOF'
          set -euo pipefail
          CONTAINER="openclaw-sgnl-openclaw-1"
          VOL_PATH=$(docker volume inspect openclaw-sgnl_openclaw-state --format '{{ .Mountpoint }}' 2>/dev/null || true)

          if [ -z "$VOL_PATH" ]; then
            echo "WARNING: Could not find openclaw-state volume — skipping config sync"
            exit 0
          fi

          CONFIG_FILE="$VOL_PATH/openclaw.json"
          PATCH_FILE="/tmp/model-patch.json"

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "WARNING: Config file not found at $CONFIG_FILE — skipping"
            exit 0
          fi

          # Backup current config
          cp "$CONFIG_FILE" "$CONFIG_FILE.bak.$(date +%Y%m%d%H%M%S)"
          echo "✓ Backed up existing config"

          # Selective merge: update only model and models (not agents.list — schema differs)
          jq --slurpfile patch "$PATCH_FILE" '
            .agents.defaults.model = $patch[0].model |
            .agents.defaults.models = $patch[0].models
          ' "$CONFIG_FILE" > "$CONFIG_FILE.tmp"

          mv "$CONFIG_FILE.tmp" "$CONFIG_FILE"
          chown 1000:1000 "$CONFIG_FILE"
          echo "✓ Model config merged into $CONFIG_FILE"
          echo "  Primary model: $(jq -r '.agents.defaults.model.primary' "$CONFIG_FILE")"

          # Restart container to pick up new config
          cd /docker/openclaw-sgnl
          docker compose restart
          echo "✓ Container restarted to apply new config"

          # Wait for container to be healthy
          echo "Waiting for container health..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "healthy" ]; then
              echo "✓ Container is healthy"
              break
            fi
            echo "  attempt $i/12: status=$STATUS — waiting 10s"
            sleep 10
          done

          rm -f "$PATCH_FILE"
          CONFIG_EOF

      # ── Verify HTTPS endpoint is reachable (external check) ───────────────
      - name: Verify HTTPS health endpoint
        run: |
          echo "Checking https://openclaw.yahwan.biz/health ..."
          for i in 1 2 3 4 5; do
            HTTP=$(curl -o /dev/null -sw "%{http_code}" --max-time 15 \
                     https://openclaw.yahwan.biz/health 2>/dev/null || echo "000")
            if [[ "$HTTP" == "200" ]]; then
              echo "✓ Health check passed (HTTP $HTTP)"
              break
            fi
            echo "  attempt $i/5: HTTP $HTTP — retrying in 10s"
            sleep 10
          done
          if [[ "$HTTP" != "200" ]]; then
            echo "WARNING: Health check did not return 200 (last HTTP: $HTTP)"
            echo "Check container logs on VPS:"
            echo "  ssh root@${{ secrets.VPS_HOST }} 'docker logs openclaw-sgnl-openclaw-1 --tail 50'"
            exit 1
          fi

      # ── Upload regression test scripts to VPS ─────────────────────────────
      - name: Upload test scripts to VPS
        run: |
          scp -i ~/.ssh/id_ed25519_hostinger \
              -o StrictHostKeyChecking=no \
              tests/regression-tests.sh \
              tests/r3-regression-tests.sh \
              tests/ws24-regression-tests.sh \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/"
          echo "Test scripts uploaded to VPS /tmp/"

      # ── Run regression tests on VPS ──────────────────────────────────────
      - name: Run regression tests (infrastructure)
        run: |
          set -o pipefail
          DEPLOY_NUM=${{ github.run_number }}
          LOG_DIR="operations/deployments/deploy-${DEPLOY_NUM}/logs"
          mkdir -p "$LOG_DIR"
          
          ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /tmp/regression-tests.sh' | tee "$LOG_DIR/regression-tests-output.txt"
          
          # Also copy to /tmp for artifact upload (backward compatible)
          cp "$LOG_DIR/regression-tests-output.txt" /tmp/regression-tests-output.txt

      - name: Run R3 regression tests (LINE + exec + config)
        run: |
          set -o pipefail
          DEPLOY_NUM=${{ github.run_number }}
          LOG_DIR="operations/deployments/deploy-${DEPLOY_NUM}/logs"
          mkdir -p "$LOG_DIR"
          
          ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /tmp/r3-regression-tests.sh' | tee "$LOG_DIR/r3-regression-tests-output.txt"
          
          cp "$LOG_DIR/r3-regression-tests-output.txt" /tmp/r3-regression-tests-output.txt

      - name: Run WS-2.4 regression tests (session + context + exec + resources)
        run: |
          set -o pipefail
          DEPLOY_NUM=${{ github.run_number }}
          LOG_DIR="operations/deployments/deploy-${DEPLOY_NUM}/logs"
          mkdir -p "$LOG_DIR"
          
          ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /tmp/ws24-regression-tests.sh' | tee "$LOG_DIR/ws24-regression-tests-output.txt"
          
          cp "$LOG_DIR/ws24-regression-tests-output.txt" /tmp/ws24-regression-tests-output.txt

      # ── On failure: capture diagnostic logs ──────────────────────────────
      - name: Capture diagnostic logs on failure
        if: failure()
        run: |
          DEPLOY_NUM=${{ github.run_number }}
          LOG_DIR="operations/deployments/deploy-${DEPLOY_NUM}/logs"
          mkdir -p "$LOG_DIR"
          
          {
            echo "=== Container logs (last 200 lines, errors only) ==="
            ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'docker logs openclaw-sgnl-openclaw-1 --tail=200 2>&1 | grep -E "ERROR|Exception|Traceback|FATAL"' || true
            
            echo ""
            echo "=== Container status ==="
            ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'docker ps -a --filter name=openclaw' || true
            
            echo ""
            echo "=== Nginx config test ==="
            ssh -i ~/.ssh/id_ed25519_hostinger -o StrictHostKeyChecking=no \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'nginx -t 2>&1' || true
          } > "$LOG_DIR/diagnostic-logs.txt" 2>&1
          
          # Also copy to /tmp for artifact upload
          cp "$LOG_DIR/diagnostic-logs.txt" /tmp/diagnostic-logs.txt
          cat "$LOG_DIR/diagnostic-logs.txt"

      # ── Upload test results as artifacts ──────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results
          path: |
            /tmp/regression-tests-output.txt
            /tmp/r3-regression-tests-output.txt
            /tmp/ws24-regression-tests-output.txt
            /tmp/diagnostic-logs.txt
          retention-days: 30

      # ── Commit deployment logs to repo ─────────────────────────────────────
      - name: Commit deployment logs
        if: always()
        run: |
          git config --local user.email "ci@openclaw.dev"
          git config --local user.name "OpenClaw CI"
          
          DEPLOY_DIR="operations/deployments/deploy-${{ github.run_number }}"
          if [ -d "$DEPLOY_DIR/logs" ]; then
            git add "$DEPLOY_DIR/" 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "logs(deploy): capture regression tests from run #${{ github.run_number }}" 2>/dev/null || true
              git push -u origin main 2>/dev/null || true
              echo "✓ Deployment logs committed and pushed"
            fi
          fi

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519_hostinger
