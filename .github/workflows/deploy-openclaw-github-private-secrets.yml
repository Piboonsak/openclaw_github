name: Deploy OpenClaw (private secrets)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]]; then
            echo "DEPLOY_SSH_PRIVATE_KEY secret is required" >&2
            exit 1
          fi
          if [[ -z "${VPS_HOST:-}" ]]; then
            echo "VPS_HOST secret is required" >&2
            exit 1
          fi

          SSH_KEY_PATH="$HOME/.ssh/id_ed25519"
          mkdir -p "$HOME/.ssh"
          echo "$DEPLOY_SSH_PRIVATE_KEY" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"
          ssh-keyscan -H "$VPS_HOST" >> "$HOME/.ssh/known_hosts"
          echo "SSH_KEY_PATH=$SSH_KEY_PATH" >> "$GITHUB_ENV"

      - name: Health check (gateway)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_KEY_PATH: ${{ env.SSH_KEY_PATH }}
        run: |
          set -euo pipefail
          USER_VALUE="${VPS_USER:-root}"
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=yes "${USER_VALUE}@${VPS_HOST}" \
            "curl -fsS http://127.0.0.1:18789/health"

      - name: Save Best-Known-Good config
        if: success()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_KEY_PATH: ${{ env.SSH_KEY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          USER_VALUE="${VPS_USER:-root}"
          ssh -i "$SSH_KEY_PATH" -o StrictHostKeyChecking=yes "${USER_VALUE}@${VPS_HOST}" \
            "SHORT_SHA=${SHORT_SHA} bash -s" < scripts/bkg-save.sh

  regression:
    name: NongKung regression suite
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run NongKung regression tests
        run: bash scripts/regression-check.sh
